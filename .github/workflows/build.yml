name: Build VCMI Windows (GSM Stage-1 patch)

# Builds VCMI 1.7.4 for Windows x64 with the GSM scope-filter patch applied,
# reproducing VCMI's own official CI steps. Produces a downloadable Windows build.
# Runs automatically when this file is committed, and via the "Run workflow" button.

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout VCMI 1.7.4
        uses: actions/checkout@v6
        with:
          repository: vcmi/vcmi
          ref: '1.7.4'
          submodules: recursive
          path: vcmi

      - name: Apply GSM 3-state fog + scope patch
        run: |
          cd vcmi
          echo '' | base64 -d > gsm.patch
          git apply --verbose gsm.patch
          echo '' | base64 -d > gsm-v12.patch
          git apply --verbose gsm-v12.patch
          echo '' | base64 -d > gsm-v13.patch
          git apply --verbose gsm-v13.patch
          echo '' | base64 -d > gsm-v14.patch
          git apply --verbose gsm-v14.patch
          echo '' | base64 -d > gsm-v15.patch
          git apply --verbose gsm-v15.patch
          echo '' | base64 -d > gsm-v16.patch
          git apply --verbose gsm-v16.patch
          echo '' | base64 -d > gsm-v17.patch
          git apply --verbose gsm-v17.patch
          echo '' | base64 -d > gsm-v18.patch
          git apply --verbose gsm-v18.patch
          echo '' | base64 -d > gsm-v19.patch
          git apply --verbose gsm-v19.patch
          echo '' | base64 -d > gsm-v20.patch
          git apply --verbose gsm-v20.patch
          echo '' | base64 -d > gsm-v21.patch
          git apply --verbose gsm-v21.patch
          echo '' | base64 -d > gsm-v22.patch
          git apply --verbose gsm-v22.patch
          : > gsm-s0.b64
          printf %s '' >> gsm-s0.b64
          printf %s '' >> gsm-s0.b64
          printf %s '' >> gsm-s0.b64
          printf %s '' >> gsm-s0.b64
          printf %s '' >> gsm-s0.b64
          printf %s '' >> gsm-s0.b64
          printf %s '' >> gsm-s0.b64
          printf %s '' >> gsm-s0.b64
          printf %s '' >> gsm-s0.b64
          printf %s '' >> gsm-s0.b64
          printf %s 'b3Mueik7CisJfQorfQorfQogdm9pZCBOdWxsa2lsbGVyOjp0cmFjZVBsYXllclN0YXR1cyhib29sIGJlZ2lubmluZykgY29uc3QKIHsKICNpZiBOSzJBSV9UUkFDRV9MRVZFTCA+PSAxCg==' >> gsm-s0.b64
          base64 -d gsm-s0.b64 > gsm-s0.patch
          git apply --verbose gsm-s0.patch
          : > gsm-s1.b64
          printf %s '' >> gsm-s1.b64
          printf %s '' >> gsm-s1.b64
          printf %s '' >> gsm-s1.b64
          printf %s '' >> gsm-s1.b64
          printf %s '' >> gsm-s1.b64
          printf %s '' >> gsm-s1.b64
          printf %s '' >> gsm-s1.b64
          printf %s 'ZU51bTsKKwlsb2dBaS0+d2FybigiU1RSQVRCSUFTIHBsYXllcj0lZCBjYW5kaWRhdGVzPSVkIHN0cm9uZyg+MC41KT0lZCBtYXhTY29yZT0lLjFmIiwgbWVOdW0sIHN0YXRpY19jYXN0PGludD4ocm93cy5zaXplKCkpLCBuU3Ryb25nLCBtYXhTY29yZSk7Cit9Cit9CisKIH0K' >> gsm-s1.b64
          base64 -d gsm-s1.b64 > gsm-s1.patch
          git apply --verbose --recount gsm-s1.patch
          : > gsm-b1.b64
          printf %s '' >> gsm-b1.b64
          printf %s '' >> gsm-b1.b64
          printf %s '' >> gsm-b1.b64
          printf %s '' >> gsm-b1.b64
          base64 -d gsm-b1.b64 > gsm-b1.patch
          git apply --verbose --recount gsm-b1.patch
          : > gsm-b3.b64
          printf %s '' >> gsm-b3.b64
          printf %s '' >> gsm-b3.b64
          printf %s '' >> gsm-b3.b64
          printf %s '' >> gsm-b3.b64
          printf %s '' >> gsm-b3.b64
          printf %s '' >> gsm-b3.b64
          printf %s 'd2FpdGluZ0luZm8tPmh1bWFuKQorCXsKKwkJaWYocGxheWVyc0luQ29udGFjdChhY3RpdmUsIHdhaXRpbmcpKQorCQkJcmV0dXJuIGZhbHNlOworCQlyZXR1cm4gdHJ1ZTsKKwl9CisKIAlpZiAoYWN0aXZlSW5mby0+aHVtYW4gIT0gd2FpdGluZ0luZm8tPmh1bWFuKQo=' >> gsm-b3.b64
          base64 -d gsm-b3.b64 > gsm-b3.patch
          git apply --verbose --recount gsm-b3.patch

      - name: Install Conan dependencies (prebuilt)
        run: |
          cd vcmi
          pipx install conan
          source CI/install_conan_dependencies.sh dependencies-windows-x64

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: '14.29'

      - name: Install Conan profile
        run: |
          cd vcmi
          conan profile detect
          conan install . \
            --output-folder=conan-generated \
            --build=never \
            --profile=dependencies/conan_profiles/msvc-x64 \
            --conf="tools.cmake.cmaketoolchain:generator=Ninja" \
            -s "&:build_type=RelWithDebInfo" \
            -c tools.env.virtualenv:powershell=pwsh \
            -o "&:target_pre_windows10=True"
          echo "CONANRUN_PWSH_SCRIPT=conan-generated/conanrun.ps1" >> "$GITHUB_ENV"

      - name: Configure
        shell: pwsh
        run: |
          cd vcmi
          & $env:CONANRUN_PWSH_SCRIPT
          cmake --preset windows-msvc-ninja-release -DENABLE_CCACHE=OFF -DCMAKE_C_COMPILER_LAUNCHER= -DCMAKE_CXX_COMPILER_LAUNCHER=

      - name: Build
        shell: pwsh
        run: |
          cd vcmi
          & $env:CONANRUN_PWSH_SCRIPT
          cmake --build --preset windows-msvc-ninja-release

      - name: Pack (full Windows zip)
        shell: pwsh
        run: |
          cd vcmi
          & $env:CONANRUN_PWSH_SCRIPT
          cd out/build/windows-msvc-ninja-release
          cpack -C RelWithDebInfo

      - name: Upload Windows build
        uses: actions/upload-artifact@v6
        with:
          name: vcmi-windows-x64-GSM
          compression-level: 9
          path: |
            vcmi/out/build/windows-msvc-ninja-release/*.zip
            vcmi/out/build/windows-msvc-ninja-release/**/Nullkiller2.dll
